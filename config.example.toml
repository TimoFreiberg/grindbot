# Grindbot configuration file
# Place this at grindbot.toml in the repo root or pass --config <path>

[github]
owner = "your-org"
repo = "your-repo"
# GitHub usernames whose issues may be implemented (not email addresses)
allowlist = ["alice", "bob"]

[supervisor]
max_parallelism = 2        # Number of concurrent implementer agents
poll_interval_secs = 30    # Seconds between poll cycles
base_branch = "main"       # Branch to merge into
merge_lock_timeout_secs = 1800 # Stale merge-lock timeout
final_check_command = "cargo test" # Optional final gate run in the workspace
stall_threshold_cycles = 5   # Warn after N cycles with no token growth

[polytoken]
binary = "polytoken"       # Path to polytoken binary
max_tool_turns = 200        # Max tool turns per implementer session

[workspace]
prefix = "grindbot"         # Workspace name prefix
workspaces_dir = ".grindbot-workspaces"  # Directory for workspaces (gitignored)
