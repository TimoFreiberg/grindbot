name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR="grindbot-${{ matrix.target }}-v${VERSION}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/grindbot" "$DIR/"
          tar czf "$DIR.tgz" "$DIR"
      - uses: actions/upload-artifact@v4
        with:
          name: grindbot-${{ matrix.target }}
          path: grindbot-*.tgz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: assets/grindbot-*.tgz
          generate_release_notes: true
